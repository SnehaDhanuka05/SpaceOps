version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: spaceops_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spaceops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spaceops_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: spaceops_web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/spaceops
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - NASA_API_KEY=DEMO_KEY
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: spaceops_worker
    command: celery -A app.tasks.celery_app worker -Q celery --loglevel=info
    volumes:
      - .:/code
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/spaceops
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - NASA_API_KEY=DEMO_KEY
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai_worker:
    build: .
    container_name: spaceops_ai_worker
    command: celery -A app.tasks.celery_app worker -Q ai -c 1 --loglevel=info
    volumes:
      - .:/code
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/spaceops
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - NASA_API_KEY=DEMO_KEY
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
